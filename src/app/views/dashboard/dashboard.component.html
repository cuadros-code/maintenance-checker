<div class="layout">
  <header class="navbar" role="banner">
    <span class="navbar__brand">MyTracker</span>

    <div class="navbar__user">
      <span class="navbar__email" aria-label="Usuario autenticado">
        {{ auth.user()?.email }}
      </span>
      <button
        class="btn btn--logout"
        (click)="signOut()"
        [disabled]="loggingOut()"
        [attr.aria-busy]="loggingOut()"
      >
        {{ loggingOut() ? 'Saliendo...' : 'Cerrar sesión' }}
      </button>
    </div>
  </header>

  <div class="body">
    <app-sidebar />

    <main class="content" id="main-content">
      <router-outlet />
    </main>
  </div>
</div>
