<div class="layout">
  <header class="navbar" role="banner">
    <div class="navbar__start">
      <button
        class="btn--menu"
        type="button"
        (click)="sidebarOpen.update(v => !v)"
        [attr.aria-expanded]="sidebarOpen()"
        aria-controls="sidebar"
        aria-label="Abrir menú de navegación"
      >
        <span class="btn--menu__bar"></span>
        <span class="btn--menu__bar"></span>
        <span class="btn--menu__bar"></span>
      </button>
      <span class="navbar__brand">Revisor.io</span>
    </div>

    <div class="navbar__user">
      <button
        class="btn btn--incident"
        type="button"
        (click)="incidentModalOpen.set(true)"
        aria-label="Reportar un incidente"
      >
        <span class="material-icons btn--incident__icon" aria-hidden="true">warning</span>
        <span class="btn--incident__label">Reportar incidente</span>
      </button>
      <span class="navbar__email" aria-label="Usuario autenticado">
        {{ auth.user()?.email }}
      </span>
      <span class="navbar__avatar" aria-hidden="true">
        {{ auth.user()?.email?.[0]?.toUpperCase() ?? '?' }}
      </span>
      <button
        class="btn btn--logout"
        type="button"
        (click)="signOut()"
        [disabled]="loggingOut()"
        [attr.aria-busy]="loggingOut()"
        [attr.aria-label]="loggingOut() ? 'Saliendo...' : 'Cerrar sesión'"
      >
        <span class="btn--logout__label">{{ loggingOut() ? 'Saliendo...' : 'Cerrar sesión' }}</span>
        <span class="material-icons btn--logout__icon" aria-hidden="true">logout</span>
      </button>
    </div>
  </header>

  @if (incidentModalOpen()) {
    <app-incident-modal
      [userEmail]="auth.user()?.email ?? null"
      (closed)="incidentModalOpen.set(false)"
      (reported)="incidentModalOpen.set(false)"
    />
  }

  <div class="body">
    <app-sidebar
      id="sidebar"
      [open]="sidebarOpen()"
      (closed)="sidebarOpen.set(false)"
    />

    <main class="content" id="main-content">
      <router-outlet />
    </main>
  </div>
</div>
